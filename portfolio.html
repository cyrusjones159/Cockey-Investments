<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio Facets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      padding: 20px;
    }
    .epoch-cell {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .epoch-quad {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr;
      column-gap: 0.5rem;
      white-space: nowrap;
    }
    .epoch-quad span {
      text-align: right;
    }
    .epoch-quad span:first-child {
      text-align: left;
    }
    .ratios-cell {
      white-space: nowrap;
      font-size: 0.85rem;
    }
    tfoot tr td {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Portfolio Facets</h1>

    <button id="loadBtn" class="btn btn-primary mb-3">
      Load Portfolio
    </button>

    <div class="table-responsive">
      <table class="table table-striped table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th scope="col">Sector</th>
            <th scope="col">
              Epoch 1<br />
              <small>count | target | actual | projected</small>
            </th>
            <th scope="col">
              Epoch 2<br />
              <small>count | target | actual | projected</small>
            </th>
            <th scope="col">
              Epoch 3<br />
              <small>count | target | actual | projected</small>
            </th>
            <th scope="col">
              Ratios<br />
              <small>E2/E1 &nbsp; E3/E1</small>
            </th>
          </tr>
        </thead>
        <tbody id="portfolioBody">
          <!-- rows injected by JS -->
        </tbody>
        <tfoot>
          <tr id="totalsRow">
            <!-- totals injected by JS -->
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Modal for share breakout -->
  <div class="modal fade" id="breakoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="breakoutTitle">Share Breakout</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"
                  aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <table class="table table-sm table-bordered">
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Shares</th>
                <th>Price</th>
                <th>Actual</th>
              </tr>
            </thead>
            <tbody id="breakoutBody">
              <!-- rows injected by JS -->
            </tbody>
          </table>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary"
                  data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- External portfolio logic -->
  <script src="portfolio.js"></script>
</body>
</html>
