<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cocky Investments – Portfolio Epochs - Version 5.3 JSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <style>
    body {
      padding: 20px;
    }

    .epoch-cell {
      font-size: 0.85rem;
      vertical-align: top;
    }

    .epoch-quad {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 0.25rem 0.75rem;
      align-items: center;
    }

    .epoch-quad span:first-child {
      font-weight: 600;
    }

    .ratios-cell {
      font-size: 0.8rem;
      white-space: nowrap;
    }

    table th,
    table td {
      vertical-align: middle;
    }

    #breakoutTable th,
    #breakoutTable td {
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 mb-0">Cocky Investments – Portfolio Epochs</h1>
      <button id="loadBtn" class="btn btn-primary btn-sm">
        Reload Data
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th rowspan="2">Sector</th>
            <th colspan="4" class="text-center">Epoch 1</th>
            <th colspan="4" class="text-center">Epoch 2</th>
            <th colspan="4" class="text-center">Epoch 3</th>
            <th rowspan="2" class="text-center">Ratios</th>
          </tr>
          <tr>
            <th>#</th>
            <th>Target</th>
            <th>Actual</th>
            <th>Projected</th>

            <th>#</th>
            <th>Target</th>
            <th>Actual</th>
            <th>Projected</th>

            <th>#</th>
            <th>Target</th>
            <th>Actual</th>
            <th>Projected</th>
          </tr>
        </thead>
        <tbody id="portfolioBody">
          <!-- Filled by portfolio.js -->
        </tbody>
        <tfoot>
          <tr id="totalsRow">
            <!-- Filled by portfolio.js -->
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Breakout Modal -->
  <div
    class="modal fade"
    id="breakoutModal"
    tabindex="-1"
    aria-labelledby="breakoutTitle"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="breakoutTitle">Sector – Epoch Stocks</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <div class="table-responsive">
            <table
              id="breakoutTable"
              class="table table-sm table-striped table-bordered mb-0"
            >
              <thead class="table-light">
                <tr>
                  <th>Ticker</th>
                  <th>Shares</th>
                  <th>Price</th>
                  <th>Actual</th>
                  <th>Projected</th>
                </tr>
              </thead>
              <tbody id="breakoutBody">
                <!-- Filled by portfolio.js -->
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary btn-sm"
            data-bs-dismiss="modal"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <!-- Your portfolio logic -->
  <script src="portfolio.js"></script>
</body>
</html>
